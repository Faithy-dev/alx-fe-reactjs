name: gema
description: Gemini AI-powered chat app called Gema 🟡
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Google Gemini AI SDK
  google_generative_ai: ^0.2.2

  provider: ^6.1.1

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  speech_to_text: ^6.4.1
  path_provider: ^2.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

